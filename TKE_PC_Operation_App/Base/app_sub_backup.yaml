                    =If(IsBlank(glb_search.Value)=false, 
                    Filter('TKE P&C Backup tracking', 'Case number'=glb_search.Value), 
                    If(Backup_filterview.Selected.Value="Active requests",
                    Filter('TKE P&C Backup tracking', And(Status.Value<>"Completed", Status.Value<>"Ignored")),
                    If(Backup_filterview.Selected.Value="My requests",
                    Filter('TKE P&C Backup tracking', 'Created By'.Email=User().Email, And(Status.Value<>"Completed", Status.Value<>"Ignored")),
                    If(Backup_filterview.Selected.Value="My backup request",
                    Filter('TKE P&C Backup tracking', 'Backup engineer'.Email=User().Email, And(Status.Value<>"Completed", Status.Value<>"Ignored")),
