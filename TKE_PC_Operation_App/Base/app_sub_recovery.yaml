                  Visible: =canceldialogvisi
                  Width: =550
                  X: =(Parent.Width/2)-275
                  Y: =(Parent.Height/2)-275
                Children:
                  - ButtonCanvas2_20:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(141, 229, 250, 1)
                        Icon: ="Dismiss"
                        Layout: ='ButtonCanvas.Layout'.IconOnly
                        OnSelect: |-
                          =UpdateContext({canceldialogvisi: false});
                          Reset(TextInputCanvas2_4)
                        Width: =32
                        X: =518
                  - ButtonCanvas3_17:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Primary
                        BasePaletteColor: =RGBA(141, 229, 250, 1)
                        BorderRadiusBottomLeft: =10
                        BorderRadiusBottomRight: =10
                        BorderRadiusTopLeft: =10
                        BorderRadiusTopRight: =10
                        Icon: ="Add"
                        Layout: ='ButtonCanvas.Layout'.TextOnly
                        OnSelect: |-
                          =If(LookUp('TKE P&C Engineers', Email=User().Email).'Debugging mode'=true,
                              Patch(AsyncBase, Defaults(AsyncBase),
                                  {
                                      CaseID: Gallery_recovery.Selected.'Case number',
                                      Request: "Outlookrule",
                                      Detail1: "PA",
                                      SPID: LookUp('TKE P&C Backlog Management', 'Case number'=Gallery_recovery.Selected.'Case number').ID
                                  }
                              )
                              ,
                              false
                          );
                          Patch('TKE P&C Recovery tracking', Gallery_recovery.Selected,
                          {
                              Status: {Value: "Cancelled"},
                              'Next contact date (for reviewer only)': Blank(),
                              'Approved closure date (For reviewer only)': Blank()
                          });
                          Patch('Internal_ App_Notifications', Defaults('Internal_ App_Notifications'),
                          {
                              Comment: Concatenate(User().FullName, " cancelled recovery request for case ", Gallery_recovery.Selected.'Case number', " with reason: ", fielddetails),
                              Recipient: Gallery_recovery.Selected.'Created By',
                              Channel: "TKE P&C Recovery Requests"
                          }
                          );
                          If(CountRows(Filter('TKE P&C Backlog Management', 'Case number'=Gallery_recovery.Selected.'Case number'))=1,
                          Patch('TKE P&C Backlog Management', LookUp('TKE P&C Backlog Management', 'Case number'=Gallery_recovery.Selected.'Case number'),
                          {
                              Status: {Value: "Troubleshooting"}
                          }),
                          false
                          );
                          Patch('Internal_ App_Recovery_Comment', Defaults('Internal_ App_Recovery_Comment'),
                              {
                                  Comment: Concatenate("SYSTEM: The request is cancelled with reason: ", TextInputCanvas2_4.Value),
                                  Recipient: Gallery_recovery.Selected.'Created By',
                                  'Case number': Gallery_recovery.Selected.'Case number'
                              }
                          );
                          UpdateContext({canceldialogvisi: false});
                          Reset(TextInputCanvas2_4);
                          Refresh('TKE P&C Recovery tracking');
                          UpdateContext({formvisi: false});
                          UpdateContext({listvisi: true})
