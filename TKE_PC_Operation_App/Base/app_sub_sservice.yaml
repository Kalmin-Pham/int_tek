- sub_sservice:
    Control: GroupContainer@1.3.0
    Variant: ManualLayout
    Properties:
      Height: =Parent.Height-35
      Visible: =If(activescreen="sservice", true, false)
      Width: =Parent.Width-glb_menu.Width
      X: =glb_menu.Width
      Y: =35
    Children:
      - TextCanvas1:
          Control: Text@0.0.51
          Properties:
            PaddingTop: =5
            Text: =If(Or(DropdownCanvas2.Selected.Value="Onboard new user", DropdownCanvas2.Selected.Value="Offboard user"), "Email address", DropdownCanvas2.Selected.Value="Enable/Disable feature flag", "FCB name", DropdownCanvas2.Selected.Value="Check customer history", "Customer ID", "Case ID")
            Weight: ='TextCanvas.Weight'.Bold
            X: =40
            Y: =TextInputCanvas4.Y
      - TextCanvas1_1:
          Control: Text@0.0.51
          Properties:
            PaddingTop: =5
            Text: ="Request"
            Weight: ='TextCanvas.Weight'.Bold
            X: =40
            Y: =46
      - TextInputCanvas4:
          Control: TextInput@0.0.54
          Properties:
            BorderRadius: =5
            TriggerOutput: ='TextInputCanvas.TriggerOutput'.Keypress
            Visible: =TextCanvas1.Text<>"FCB name"
            X: =136
            Y: =DropdownCanvas2.Y+DropdownCanvas2.Height+15
      - DropdownCanvas2:
          Control: DropDown@0.0.45
          Properties:
            BorderRadius: =5
            Items: =["Reopen case/request", "Enable/Disable feature flag", "Change user setting", "Check customer history", "Onboard new user", "Offboard user"]
            X: =136
            Y: =46
      - TextCanvas1_2:
          Control: Text@0.0.51
          Properties:
            PaddingTop: =5
            Text: ="Details"
            Weight: ='TextCanvas.Weight'.Bold
            X: =40
            Y: =TextInputCanvas4_1.Y
      - TextInputCanvas4_1:
          Control: TextInput@0.0.54
          Properties:
            BorderRadius: =5
            Height: =170
            Mode: ='TextInputCanvas.Mode'.Multiline
            TriggerOutput: ='TextInputCanvas.TriggerOutput'.Keypress
            X: =136
            Y: =TextInputCanvas4.Y+TextInputCanvas4.Height+15
      - ButtonCanvas5:
          Control: Button@0.0.45
          Properties:
            Appearance: ='ButtonCanvas.Appearance'.Secondary
            DisplayMode: =If(And(Or(DropdownCanvas2.Selected.Value="Onboard new user", DropdownCanvas2.Selected.Value="Offboard user"), LookUp('TKE P&C Engineers', Email=User().Email).'App_setting_Enable admin mode'=false), DisplayMode.Disabled, DisplayMode.Edit)
            OnSelect: "=UpdateContext({s1_visi: false});\r\nUpdateContext({s2_visi: false});\r\nUpdateContext({s3_visi: false});\r\nUpdateContext({s4_visi: false});\r\n\r\nIf(DropdownCanvas2.Selected.Value=\"Reopen case/request\",\r\n    UpdateContext({s1_visi: true});\r\n    UpdateContext({s1_icon: \"ArrowSync\"});\r\n    UpdateContext({s1_text: \"Searching for case ID...\"});\r\n    UpdateContext({s1_color: RGBA(15, 108, 189, 1)});\r\n    If(Or(CountRows(Filter('TKE P&C Backlog Management', 'Case number'=TextInputCanvas4.Value))>0, CountRows(Filter('TKE P&C Recovery tracking', 'Case number'=TextInputCanvas4.Value))>0),\r\n        UpdateContext({s1_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s1_text: \"Found matched object\"});\r\n        UpdateContext({s1_color: RGBA(52, 152, 47, 1)});\r\n        \r\n        UpdateContext({s2_visi: true});\r\n        UpdateContext({s2_icon: \"ArrowSync\"});\r\n        UpdateContext({s2_text: \"Executing request...\"});\r\n        UpdateContext({s2_color: RGBA(15, 108, 189, 1)});\r\n        'TKEPC-Selfserve1'.Run(TextInputCanvas4.Value);\r\n        UpdateContext({s2_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s2_text: \"Request has been executed\"});\r\n        UpdateContext({s2_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s3_visi: true});\r\n        UpdateContext({s3_icon: \"ArrowSync\"});\r\n        UpdateContext({s3_text: \"Updating database...\"});\r\n        Patch('Int_App_SelfService', Defaults('Int_App_SelfService'),\r\n            {\r\n                'SS Request': \"Reopen case/request\",\r\n                'Case ID': TextInputCanvas4.Value,\r\n                Status: {Value: \"Completed\"},\r\n                Details: TextInputCanvas4_1.Value\r\n            }\r\n        );\r\n        UpdateContext({s3_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s3_text: \"Updated database\"});\r\n        UpdateContext({s3_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s4_visi: true});\r\n        UpdateContext({s4_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s4_text: \"Success\"});\r\n        UpdateContext({s4_color: RGBA(52, 152, 47, 1)});\r\n        ,\r\n        UpdateContext({s1_icon: \"DismissCircle\"});\r\n        UpdateContext({s1_text: \"No matched object\"});\r\n        UpdateContext({s1_color: RGBA(215, 58, 60, 1)});\r\n    )\r\n    ,\r\n    false\r\n);\r\n\r\nIf(DropdownCanvas2.Selected.Value=\"Enable/Disable feature flag\",\r\n    If(DropdownCanvas3.Selected.Value=\"Outlook - Auto create new folder/Rule\",\r\n        UpdateContext({s1_visi: true});\r\n        UpdateContext({s1_icon: \"ArrowSync\"});\r\n        UpdateContext({s1_text: \"Retrieving user setting...\"});\r\n        UpdateContext({s1_color: RGBA(15, 108, 189, 1)});\r\n        UpdateContext({s1_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s1_text: If(LookUp('TKE P&C Engineers', Email=User().Email).'Auto create Outlook folder/rule'=true, \"Current value is On\", \"Current value if Off\")});\r\n        UpdateContext({s1_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s2_visi: true});\r\n        UpdateContext({s2_icon: \"ArrowSync\"});\r\n        UpdateContext({s2_text: \"Updating user setting...\"});\r\n        UpdateContext({s2_color: RGBA(15, 108, 189, 1)});\r\n        Patch('TKE P&C Engineers', LookUp('TKE P&C Engineers', Email=User().Email),\r\n            {\r\n                'Auto create Outlook folder/rule': If(LookUp('TKE P&C Engineers', Email=User().Email).'Auto create Outlook folder/rule'=true, false, true)\r\n            }\r\n        );\r\n        UpdateContext({s2_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s2_text: \"User setting has been updated\"});\r\n        UpdateContext({s2_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s3_visi: true});\r\n        UpdateContext({s3_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s3_text: \"Success\"});\r\n        UpdateContext({s3_color: RGBA(52, 152, 47, 1)});\r\n\r\n        Patch('Int_App_SelfService', Defaults('Int_App_SelfService'),\r\n            {\r\n                'SS Request': \"Enable/Disable feature flag\",\r\n                'Case ID': DropdownCanvas3.Selected.Value,\r\n                Status: {Value: \"Completed\"},\r\n                Details: TextInputCanvas4_1.Value\r\n            }\r\n        );\r\n        ,\r\n        false\r\n    )\r\n    ,\r\n    false\r\n);\r\n\r\nIf(DropdownCanvas2.Selected.Value=\"Onboard new user\",\r\n    UpdateContext({s1_visi: true});\r\n    UpdateContext({s1_icon: \"ArrowSync\"});\r\n    UpdateContext({s1_text: \"Configuring SharePoint and App profile...\"});\r\n    UpdateContext({s1_color: RGBA(15, 108, 189, 1)});\r\n    Set(intstatus, 'TKEPC-Onboarduser'.Run(TextInputCanvas4.Value).status);\r\n    If(intstatus=\"Request has been completed\",\r\n        UpdateContext({s1_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s1_text: \"Internal profile has been configured\"});\r\n        UpdateContext({s1_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s2_visi: true});\r\n        UpdateContext({s2_icon: \"ArrowSync\"});\r\n        UpdateContext({s2_text: \"Configuring Engineer database...\"});\r\n        UpdateContext({s2_color: RGBA(15, 108, 189, 1)});\r\n        Patch('TKE P&C Engineers', Defaults('TKE P&C Engineers'),\r\n            {\r\n                Email: TextInputCanvas4.Value,\r\n                Role: {Value: \"Engineer\"},\r\n                Engineer: \r\n                    {\r\n                        '@odata.type':\"#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser\",\r\n                        Claims: Concatenate(\"i:0#.f|membership|\", TextInputCanvas4.Value),\r\n                        Department: \"\",\r\n                        DisplayName: \"\",\r\n                        Email: TextInputCanvas4.Value,\r\n                        JobTitle: \"\",\r\n                        Picture: \"\"\r\n                    },\r\n                'AA Skill': {Value: \"Professional Only\"},\r\n                'Working shift': {Value: \"8 AM - 5 PM\"},\r\n                'App_setting_Teams notification': true,\r\n                'Billable status': {Value: \"Non-billable\"},\r\n                'AAD ID': Office365Users.UserProfile(TextInputCanvas4.Value).Id\r\n            }\r\n        );\r\n        UpdateContext({s2_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s2_text: \"Database has been configured\"});\r\n        UpdateContext({s2_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s3_visi: true});\r\n        UpdateContext({s3_icon: \"ArrowSync\"});\r\n        UpdateContext({s3_text: \"Sending AAD to queue for flow config...\"});\r\n        UpdateContext({AADID: Office365Users.UserProfile(TextInputCanvas4.Value).Id});\r\n        UpdateContext({s3_color: RGBA(15, 108, 189, 1)});\r\n        UpdateContext({s3_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s3_text: \"Queue has been updated\"});\r\n        UpdateContext({s3_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s4_visi: true});\r\n        UpdateContext({s4_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s4_text: \"Success\"});\r\n        UpdateContext({s4_color: RGBA(52, 152, 47, 1)});\r\n        ,\r\n        UpdateContext({s1_icon: \"DismissCircle\"});\r\n        UpdateContext({s1_text: intstatus});\r\n        UpdateContext({s1_color: RGBA(215, 58, 60, 1)});\r\n    );\r\n    ,\r\n    false\r\n);\r\n\r\nIf(DropdownCanvas2.Selected.Value=\"Offboard user\",\r\n    UpdateContext({s1_visi: true});\r\n    UpdateContext({s1_icon: \"ArrowSync\"});\r\n    UpdateContext({s1_text: \"Scanning assigned records...\"});\r\n    UpdateContext({s1_color: RGBA(15, 108, 189, 1)});\r\n    If(CountRows(Filter('TKE P&C Recovery tracking', And('Created By'.Email=TextInputCanvas4.Value, Status.Value<>\"Closed\", Status.Value<>\"Cancelled\")))=0,\r\n        UpdateContext({s1_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s1_text: \"User is ready to be removed\"});\r\n        UpdateContext({s1_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s2_visi: true});\r\n        UpdateContext({s2_icon: \"ArrowSync\"});\r\n        UpdateContext({s2_text: \"Removing core records...\"});\r\n        UpdateContext({s2_color: RGBA(15, 108, 189, 1)});\r\n        RemoveIf('TKE P&C Backlog Management', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('TKE P&C ICM approval requests', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('TKE P&C Consultation requests', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('TKE P&C Recovery tracking', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('TKE P&C Backup tracking', 'Created By'.Email=TextInputCanvas4.Value);\r\n        UpdateContext({s2_text: \"Removing log...\"});\r\n        RemoveIf(Int_App_SelfService, 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('Internal_ App_Backlog_Comment', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('Internal_ App_Recovery_Comment', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('Internal_ App_Backup_Comment', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('Internal_ App_Consultation_Comment', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('Internal_ App_ICM_Comment', 'Created By'.Email=TextInputCanvas4.Value);\r\n        UpdateContext({s2_text: \"Removing notification...\"});\r\n        RemoveIf('Internal_ App_Notifications', 'Created By'.Email=TextInputCanvas4.Value);\r\n        RemoveIf('Internal_ App_Notifications', Recipient.Email=TextInputCanvas4.Value);\r\n        UpdateContext({s2_text: \"Removing leave and event...\"});\r\n        RemoveIf('TKE P&C Leave requests', Engineer.Email=TextInputCanvas4.Value);\r\n        RemoveIf('TKE PC - Schedule', Agent.Email=TextInputCanvas4.Value);\r\n        UpdateContext({s2_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s2_text: \"All associated records have been removed\"});\r\n        UpdateContext({s2_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s3_visi: true});\r\n        UpdateContext({s3_icon: \"ArrowSync\"});\r\n        UpdateContext({s3_text: \"Removing user in database...\"});\r\n        UpdateContext({s3_color: RGBA(15, 108, 189, 1)});\r\n        RemoveIf('TKE P&C Engineers', Email=TextInputCanvas4.Value);\r\n        UpdateContext({s3_text: \"Removing user Sharepoint group...\"});\r\n        'TKEPC-Offboarduser'.Run(TextInputCanvas4.Value);\r\n        UpdateContext({s3_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s3_text: \"User has been successfully removed\"});\r\n        UpdateContext({s3_color: RGBA(52, 152, 47, 1)});\r\n\r\n        UpdateContext({s4_visi: true});\r\n        UpdateContext({s4_icon: \"CheckmarkCircle\"});\r\n        UpdateContext({s4_text: \"Completed\"});\r\n        UpdateContext({s4_color: RGBA(52, 152, 47, 1)});\r\n        ,\r\n        UpdateContext({s1_icon: \"DismissCircle\"});\r\n        UpdateContext({s1_text: \"Cannot proceed: Found active record from this user\"});\r\n        UpdateContext({s1_color: RGBA(215, 58, 60, 1)});\r\n    )\r\n    ,\r\n    false\r\n);\r\n\r\nIf(DropdownCanvas2.Selected.Value=\"Check customer history\",\r\n    UpdateContext({s1_visi: true});\r\n    UpdateContext({s1_icon: \"ArrowSync\"});\r\n    UpdateContext({s1_text: \"Retrieving CXID details...\"});\r\n    UpdateContext({s1_color: RGBA(15, 108, 189, 1)});\r\n    Patch('Int_App_SelfService', Defaults('Int_App_SelfService'),\r\n        {\r\n            'SS Request': \"Check customer history\",\r\n            Status: {Value: \"Completed\"},\r\n            Details: TextInputCanvas4_1.Value\r\n        }\r\n    );\r\n    UpdateContext({s1_icon: \"CheckmarkCircle\"});\r\n    UpdateContext({s1_text: \"ID has been saved\"});\r\n    UpdateContext({s1_color: RGBA(52, 152, 47, 1)});\r\n\r\n    UpdateContext({s2_visi: true});\r\n    UpdateContext({s2_icon: \"ArrowSync\"});\r\n    UpdateContext({s2_text: \"Sending the request to queue...\"});\r\n    UpdateContext({s2_color: RGBA(15, 108, 189, 1)});\r\n    Patch(Internal_App_Cxhistory, Defaults(Internal_App_Cxhistory),\r\n        {\r\n            'Cx ID': TextInputCanvas4.Value\r\n        }\r\n    );\r\n    UpdateContext({s2_icon: \"CheckmarkCircle\"});\r\n    UpdateContext({s2_text: \"Request has been submitted, you will receive Teams notification soon\"});\r\n    UpdateContext({s2_color: RGBA(52, 152, 47, 1)});\r\n    ,\r\n    false\r\n)"
