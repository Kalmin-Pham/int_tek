              If(CountRows(Filter('TKE P&C Recovery tracking', 'Owner (for reviewer only)'.Email=User().Email, And('Internal status 2'<>"Closed", 'Internal status 2'<>"Cancelled", 'Internal status 2'<>"Completed"), Or(IsBlank('Next contact date (for reviewer only)')=true, 'Next contact date (for reviewer only)'<=Today())))>0, RGBA(225, 225, 0, 1), RGBA(225, 225, 225, 1))
