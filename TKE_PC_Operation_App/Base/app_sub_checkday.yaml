- sub_checkday:
    Control: GroupContainer@1.3.0
    Variant: ManualLayout
    Properties:
      Fill: =If(st_darkmode.Checked=true, RGBA(53, 61, 63, 1), RGBA(0, 0, 0, 0))
      Height: =Parent.Height-35
      Visible: =If(activescreen="checkday", true, false)
      Width: =Parent.Width-glb_menu.Width
      X: =glb_menu.Width
      Y: =35
    Children:
      - sub_checkday_ribbon:
          Control: Toolbar@2.0.5
          Properties:
            Height: =36
            Items: |-
              =Table(
                  {
                      ItemKey: "refresh", 
                      ItemDisplayName: "Refresh", 
                      ItemIconName: "ArrowClockwise", 
                      ItemAppearance: "Subtle", 
                      ItemIconStyle: "Regular", 
                      ItemDisabled: false,
                      ItemVisible: true,
                      ItemTooltip: "Close"
                  }
              )
            OnSelect: |-
              =Switch(Self.Selected.ItemKey,
              "refresh", 
              Refresh('TKE P&C Backlog Management');
              Refresh('TKE P&C Backup tracking');
              Refresh('TKE P&C Consultation requests');
              Refresh('TKE P&C ICM approval requests');
              Refresh('TKE P&C Recovery tracking');
              Refresh('TKE P&C Engineers')
              )
            Padding: ='Toolbar.Padding'.Small
            Width: =500
      - TextCanvas3:
          Control: Text@0.0.51
          Properties:
            FontColor: =If(theme="Light", RGBA(0,0,0,1), RGBA(255,255,255,1))
            Height: =30
            Size: =13
            Text: |-
              =Concatenate("User name: ", User().FullName)
            Weight: ='TextCanvas.Weight'.Bold
            Width: =340
            X: =20
            Y: =60
      - TextCanvas3_1:
          Control: Text@0.0.51
          Properties:
            FontColor: =If(theme="Light", RGBA(0,0,0,1), RGBA(255,255,255,1))
            Height: =30
            Size: =13
            Text: |-
              =Concatenate("Role: ", LookUp('TKE P&C Engineers', Engineer.Email=User().Email).Role.Value)
            Weight: ='TextCanvas.Weight'.Bold
            Width: =340
            X: =20
            Y: =90
      - TextCanvas3_2:
          Control: Text@0.0.51
          Properties:
            FontColor: =If(theme="Light", RGBA(0,0,0,1), RGBA(255,255,255,1))
            Height: =30
            Size: =13
            Text: |-
              =Concatenate("Global auto assign: ", LookUp('TKE P&C Engineers', Engineer.Email=User().Email).'AA Skill'.Value)
            Weight: ='TextCanvas.Weight'.Bold
            Width: =340
            X: =20
            Y: =120
      - TextCanvas3_3:
          Control: Text@0.0.51
          Properties:
            FontColor: =If(theme="Light", RGBA(0,0,0,1), RGBA(255,255,255,1))
            Height: =30
            Size: =13
            Text: ="Backlog Management"
            Weight: ='TextCanvas.Weight'.Bold
            Width: =340
            X: =20
            Y: =190
      - TextCanvas3_4:
          Control: Text@0.0.51
          Properties:
            FontColor: =If(theme="Light", RGBA(0,0,0,1), RGBA(255,255,255,1))
            Height: =30
            Size: =13
            Text: =Concatenate(CountRows(Filter('TKE P&C Backlog Management', 'Created By'.Email=User().Email, Status.Value<>"Resolved")), " active case(s)")
            Weight: ='TextCanvas.Weight'.Semibold
            Width: =340
            X: =20
            Y: =220
      - TextCanvas3_5:
          Control: Text@0.0.51
          Properties:
            FontColor: |-
              =If(theme="Light",
              If(CountRows(Filter('TKE P&C Backlog Management', 'Created By'.Email=User().Email, And(Status.Value<>"Resolved", Status.Value<>"Pending recovery"), If(IsBlank('Next follow up')=true, 'Expected Followup'<=Today(), 'Next follow up'<=Today())))>0, RGBA(184, 0, 0, 1), RGBA(53, 61, 63, 1)),
              If(CountRows(Filter('TKE P&C Backlog Management', 'Created By'.Email=User().Email, And(Status.Value<>"Resolved", Status.Value<>"Pending recovery"), If(IsBlank('Next follow up')=true, 'Expected Followup'<=Today(), 'Next follow up'<=Today())))>0,  RGBA(225, 225, 0, 1), RGBA(225, 225, 225, 1))
              )
            Height: =30
            Size: =13
            Text: =Concatenate(CountRows(Filter('TKE P&C Backlog Management', 'Created By'.Email=User().Email, And(Status.Value<>"Resolved", Status.Value<>"Pending recovery"), If(IsBlank('Next follow up')=true, 'Expected Followup'<=Today(), 'Next follow up'<=Today()))), " case(s) need to follow up today")
            Weight: ='TextCanvas.Weight'.Semibold
            Width: =340
            X: =20
            Y: =250
      - TextCanvas3_6:
          Control: Text@0.0.51
          Properties:
            FontColor: =If(theme="Light", RGBA(0,0,0,1), RGBA(255,255,255,1))
            Height: =30
            Size: =13
            Text: ="Recovery request"
            Weight: ='TextCanvas.Weight'.Bold
