            Height: =30
            Size: =13
            Text: |-
              =Concatenate("As reviewer: ", CountRows(Filter('TKE P&C Recovery tracking', 'Owner (for reviewer only)'.Email=User().Email, And('Internal status 2'<>"Closed", 'Internal status 2'<>"Cancelled", 'Internal status 2'<>"Completed"))), " active request(s)")
            Weight: ='TextCanvas.Weight'.Semibold
            Width: =340
