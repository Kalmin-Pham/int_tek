- sub_schedule:
    Control: GroupContainer@1.3.0
    Variant: ManualLayout
    Properties:
      Height: =Parent.Height-35
      Visible: =If(activescreen="schedule", true, false)
      Width: =Parent.Width-glb_menu.Width
      X: =glb_menu.Width
      Y: =35
    Children:
      - Gallery10:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            Height: =Parent.Height-70
            Items: |-
              =ForAll(
                  Sequence(42),
                  varFirstDayOfMonth
                  +Value-Weekday(varFirstDayOfMonth, StartOfWeek.Monday)
              )
            TemplateSize: =Self.Height/6
            Width: =Parent.Width
            WrapCount: =7
            Y: =70
          Children:
            - TextCanvas18:
                Control: Text@0.0.51
                Properties:
                  Align: ='TextCanvas.Align'.Center
                  BorderColor: =RGBA(179, 179, 179, 1)
                  BorderStyle: =BorderStyle.Solid
                  BorderThickness: =0.5
                  Fill: =If(Month(DateTimeValue(Self.Text))<>Month(Today()), RGBA(122, 138, 143, 1), RGBA(255, 255, 255, 1))
                  FontColor: =If(Month(DateTimeValue(Self.Text))<>Month(Today()), RGBA(122, 138, 143, 1), RGBA(255, 255, 255, 1))
                  Height: =Gallery10.TemplateHeight
                  Text: =ThisItem.Value
                  VerticalAlign: =VerticalAlign.Middle
                  Width: =Gallery10.TemplateWidth
            - TextCanvas18_1:
                Control: Text@0.0.51
                Properties:
                  Align: ='TextCanvas.Align'.Center
                  BorderColor: =RGBA(179, 179, 179, 1)
                  BorderRadius: =15
                  BorderThickness: =0.5
                  Fill: =If(Date(Year(ThisItem.Value), Month(ThisItem.Value), Day(ThisItem.Value))=Today(), RGBA(62, 128, 149, 1), If(Month(ThisItem.Value)<>Month(Today()), RGBA(122, 138, 143, 1), RGBA(255, 255, 255, 1)))
                  FontColor: =If(Date(Year(ThisItem.Value), Month(ThisItem.Value), Day(ThisItem.Value))=Today(), Color.White, Color.Black)
                  Height: =20
                  PaddingBottom: =2
                  PaddingLeft: =1
                  PaddingRight: =2
                  Size: =12
                  Text: =Day(ThisItem.Value)
                  VerticalAlign: =VerticalAlign.Middle
                  Weight: ='TextCanvas.Weight'.Semibold
                  Width: =20
                  X: =3
                  Y: =3
            - Gallery5:
                Control: Gallery@2.15.0
                Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                Properties:
                  Height: =Gallery10.TemplateHeight-30
                  Items: =Filter('TKE PC - Schedule', Date=ThisItem.Value, If(DropdownCanvas6.Selected.Value="All", 'Task Type'.Value<>"None", 'Task Type'.Value=DropdownCanvas6.Selected.Value), If(DropdownCanvas6_1.Selected.Value="Me", Agent.Email=User().Email, Agent.Email<>"None"))
                  OnSelect: |-
                    =If(LookUp('TKE P&C Engineers', Email=User().Email).Scheduler=true,
                        UpdateContext({currentday: Date(Year(ThisItem.Date), Month(ThisItem.Date), Day(ThisItem.Date))});
                        UpdateContext({scevent_popup: true});
                        ,
                        false
                    )
                  TemplateSize: =Self.Height/4
                  Width: =Gallery10.TemplateWidth
                  Y: =30
                Children:
                  - TextCanvas17:
                      Control: Text@0.0.51
                      Properties:
                        AutoHeight: =true
                        BorderRadius: =5
                        Fill: =If(ThisItem.'Task Type'.Value="Out-of-office", RGBA(252, 160, 150, 0.25), ThisItem.'Task Type'.Value="Chat", RGBA(126, 227, 120, 0.25), ThisItem.'Task Type'.Value="Queue monitor", RGBA(180, 214, 250, 0.25), ThisItem.'Task Type'.Value="Project", RGBA(161, 109, 207, 0.25), RGBA(240, 240, 41, 0.24))
                        FontColor: =If(ThisItem.'Task Type'.Value="Out-of-office", RGBA(189, 32, 11, 1), ThisItem.'Task Type'.Value="Chat", RGBA(11, 77, 8, 1), ThisItem.'Task Type'.Value="Queue monitor", RGBA(6, 77, 153, 1), ThisItem.'Task Type'.Value="Project", RGBA(81, 17, 138, 1), RGBA(92, 92, 29, 1))
                        Height: =Gallery5.Height
                        PaddingBottom: =0
                        PaddingLeft: =5
                        PaddingRight: =5
                        PaddingTop: =2
                        Size: =13
                        Text: =Concatenate(Left(ThisItem.Agent.DisplayName, Len(ThisItem.Agent.DisplayName) - 25), " - ", ThisItem.Task.Value)
                        VerticalAlign: =VerticalAlign.Middle
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Gallery5.TemplateWidth
                        Wrap: =false
      - TextCanvas15:
          Control: Text@0.0.51
          Properties:
            Height: =40
            PaddingBottom: =5
            PaddingLeft: =5
            PaddingRight: =5
            PaddingTop: =5
            Text: =Text(Today(), "mmmm / yyyy")
            VerticalAlign: =VerticalAlign.Middle
