                  DisplayName: =DataSourceInfo([@'TKE P&C Engineers'],DataSourceInfo.DisplayName,Email)
                  MaxLength: =DataSourceInfo([@'TKE P&C Engineers'], DataSourceInfo.MaxLength, Email)
                  Required: =false
                  Update: =DataCardValue67.Value
                  Width: =392
                  X: =0
                  Y: =0
                Children:
                  - DataCardKey67:
                      Control: Text@0.0.51
                      MetadataKey: FieldName
                      Properties:
                        FontColor: =If(theme="Light", RGBA(0,0,0,1), RGBA(255,255,255,1))
                        Height: =22
                        Text: =Parent.DisplayName
                        Weight: ='TextCanvas.Weight'.Semibold
                        Width: =Parent.Width - 48
                        Wrap: =false
                        X: =24
                        Y: =10
                  - DataCardValue67:
                      Control: TextInput@0.0.54
                      MetadataKey: FieldValue
                      Properties:
                        AccessibleLabel: =Parent.DisplayName
                        DisplayMode: =Parent.DisplayMode
                        Mode: ="'TextInputCanvas.Mode'.TextInputModeSingleLine"
                        Required: =Parent.Required
                        ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                        Value: =Parent.Default
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardKey67.Y + DataCardKey67.Height + 4
                  - ErrorMessage66:
                      Control: Text@0.0.51
                      MetadataKey: ErrorMessage
                      Properties:
                        Height: =30
                        Text: =Parent.Error
                        Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                        Width: =Parent.Width - 48
                        X: =24
                        Y: =DataCardValue67.Y + DataCardValue67.Height
                  - StarVisible66:
                      Control: Text@0.0.51
                      MetadataKey: FieldRequired
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Height: =30
                        Text: ="*"
                        Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                        Width: =30
                        Y: =DataCardKey67.Y
