      - st_box_app:
          Control: GroupContainer@1.3.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =68
            LayoutDirection: =LayoutDirection.Vertical
            Width: =Parent.Width
            Y: =30
          Children:
            - st_darkmode:
                Control: Toggle@1.1.5
                Properties:
                  FontColor: =If(theme="Light", RGBA(0,0,0,1), RGBA(255,255,255,1))
                  Height: =32
                  Label: ="Dark mode (preview)"
                  OnCheck: |-
                    =UpdateContext({theme: "Dark"})
                  OnUncheck: |-
                    =UpdateContext({theme: "Light"})
                  Width: |
                    =250
                  Y: =24
