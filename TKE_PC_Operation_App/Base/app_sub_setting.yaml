- sub_setting:
    Control: GroupContainer@1.3.0
    Variant: ManualLayout
    Properties:
      Height: =Parent.Height-35
      Visible: =If(activescreen="setting", true, false)
      Width: =Parent.Width-glb_menu.Width
      X: =glb_menu.Width
      Y: =35
    Children:
      - TabList3:
          Control: TabList@2.2.31
          Properties:
            FontSize: =15
            Items: =["Personal configuration", "Security roles", "Features"]
            Size: ='TabList.Size'.Medium
            Width: =Parent.Width
